<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8C979"/>
      <stop offset="50%" stop-color="#C9A961"/>
      <stop offset="100%" stop-color="#9A8246"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0D58E"/>
      <stop offset="35%" stop-color="#D4B26A"/>
      <stop offset="65%" stop-color="#B89544"/>
      <stop offset="100%" stop-color="#7A6332"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="72" fill="#0A0A0A"/>

  <!-- Outer hexagonal frame · vertical orientation, point top/bottom -->
  <polygon points="256,72 396,176 396,336 256,440 116,336 116,176"
           fill="none" stroke="url(#gold)" stroke-width="4" stroke-linejoin="miter"/>

  <!-- Inner hexagonal frame · slightly inset, gives the embossed double-line feel -->
  <polygon points="256,92 380,184 380,328 256,420 132,328 132,184"
           fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linejoin="miter"
           opacity="0.55"/>

  <!-- MA monogram · interlocked serif letters in gold -->
  <g fill="url(#goldShine)">
    <!-- M -->
    <text x="178" y="340" font-family="'Cormorant Garamond', 'Cinzel', Georgia, serif"
          font-weight="600" font-size="240" letter-spacing="-8">M</text>
    <!-- A · positioned to overlap and interlock with M -->
    <text x="248" y="340" font-family="'Cormorant Garamond', 'Cinzel', Georgia, serif"
          font-weight="600" font-size="240" letter-spacing="-8">A</text>
  </g>
</svg>
