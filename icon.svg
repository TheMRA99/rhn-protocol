<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="rhnBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2A2A36"/>
      <stop offset="100%" stop-color="#15151E"/>
    </radialGradient>
    <filter id="rhnGlowX" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rhnGlowN" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded-square canvas -->
  <rect width="512" height="512" rx="96" fill="url(#rhnBg)"/>

  <!-- R · bone white -->
  <text x="172" y="332" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-weight="600" font-size="248"
        fill="#F2F4FA" letter-spacing="-10">R</text>

  <!-- × · crimson italic -->
  <text x="256" y="252" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="500"
        font-size="98" fill="#E11D2C" filter="url(#rhnGlowX)">×</text>

  <!-- N · wine -->
  <text x="340" y="332" text-anchor="middle"
        font-family="Fraunces, Georgia, serif" font-weight="600" font-size="248"
        fill="#C8334B" letter-spacing="-10" filter="url(#rhnGlowN)">N</text>
</svg>
