<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Logo preview</title>
<style>
body { background: #0A0A0A; margin: 0; padding: 40px; font-family: sans-serif; color: #C9A961; display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
.card { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.card img { background: #050505; }
.label { font-size: 12px; letter-spacing: 0.2em; color: #888; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="card">
    <img src="icon.svg" width="320" height="320" />
    <span class="label">icon · 320</span>
  </div>
  <div class="card">
    <img src="icon.svg" width="128" height="128" />
    <span class="label">icon · 128</span>
  </div>
  <div class="card">
    <img src="logo.svg" width="540" height="540" />
    <span class="label">logo · 540</span>
  </div>
</body>
</html>
